version: '3.8'

services:
  # The Laravel Backend (PHP-FPM)
  laravel-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: unless-stopped
    volumes:
      - ./:/var/www
    networks:
      - hrms-tier

  # The Nginx Web Server / Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hrms-webserver
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hrms-tier
    depends_on:
      - laravel-app

  # The Isolated Database
  mysql-db:
    image: mysql:8.0
    container_name: hrms-database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hrms_production
      MYSQL_USER: hrms_user
      MYSQL_PASSWORD: SuperSecurePassword2026
      MYSQL_ROOT_PASSWORD: RootSecurePassword2026
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hrms-tier

networks:
  hrms-tier:
    driver: bridge

volumes:
  mysql-data:
    driver: local
