name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Triggers automatically when you push to main

jobs:
  build-and-push:
    name: Build Immutable Docker Images
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Builds the Laravel backend, executing 'composer install' inside the container layer
    - name: Build & Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/hrms-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/hrms-backend:${{ github.sha }}

  deploy-to-production:
    name: Continuous Delivery Execution
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Execute Remote Deployment via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Create a clean production infrastructure folder if it doesn't exist
          mkdir -p ~/hrms-production
          cd ~/hrms-production

          # 2. Since we don't want to clone the whole source repo here, 
          # we just pull the compose and config files directly from your GitHub main branch
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml -o docker-compose.yml
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/nginx.conf -o nginx.conf

          # 3. Pull the fresh immutable image from DockerHub
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hrms-backend:latest

          # 4. Inject sensitive database secrets into runtime environment memory
          export DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}"
          export DB_ROOT_PASSWORD="${{ secrets.PROD_DB_ROOT_PASSWORD }}"
          export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          # 5. Bring down containers and drop the temporary asset volume to clear old assets
          docker compose down

          # 6. Fire up the fresh immutable image layers
          docker compose up -d --build

          # 7. Execute production optimizations inside the application container
          docker exec hrms-backend php artisan key:generate --no-interaction
          docker exec hrms-backend php artisan config:cache
          docker exec hrms-backend php artisan view:cache

          echo "Waiting for MySQL container to become fully responsive..."
          for i in {1..30}; do
            if docker exec hrms-database mysqladmin ping -u hrms_user --password="Hi@laravelApp@316$" --silent; then
              echo "MySQL is alive and accepting structural schemas!"
              break
            fi
            echo "Database port binding initialized, waiting for engine startup loop ($i/30)..."
            sleep 3
          done

          docker exec hrms-backend php artisan migrate --force
